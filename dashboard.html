<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisNet Edge Core Engine</title>
    <style>
        body {
            font-family: monospace;
            background-color: #020617;
            color: #f8fafc;
            padding: 40px;
            margin: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            color: #38bdf8;
            margin: 0;
            font-size: 24px;
        }
        .subtitle {
            color: #94a3b8;
            margin: 5px 0 0 0;
            font-size: 13px;
        }
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .card {
            border: 2px solid #334155;
            padding: 20px;
            border-radius: 12px;
            background: #0f172a;
            transition: all 0.4s ease;
        }
        
        /* Casing & Status Specific Styles */
        .border-critical, .border-CRITICAL { border-color: #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .border-high, .border-HIGH { border-color: #f97316 !important; box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
        .border-standby, .border-STANDBY { border-color: #10b981 !important; }
        .border-unknown, .border-UNKNOWN { border-color: #a855f7 !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }

        .text-critical, .text-CRITICAL { color: #f43f5e; font-weight: bold; }
        .text-high, .text-HIGH { color: #fbbf24; font-weight: bold; }
        .text-standby, .text-STANDBY { color: #34d399; font-weight: bold; }
        .text-unknown, .text-UNKNOWN { color: #c084fc; font-weight: bold; }

        .data-box {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            color: #cbd5e1;
            line-height: 1.6;
            min-height: 60px;
            margin-top: 10px;
        }
        .payload-box {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            color: #4ade80;
            word-break: break-all;
            font-size: 12px;
            min-height: 80px;
        }
        .btn {
            background: #1e293b;
            color: #fff;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn:hover { background: #334155; }
        .badge {
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
        }
        .pulse-box {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
        }
        .animate-pulse { animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>AegisNet System Operator</h1>
            <p class="subtitle">Decentralized Edge AI Disaster Hub</p>
        </div>
        <div class="badge">
            <span class="pulse-box animate-pulse"></span>
            Sovereign Node Online
        </div>
    </header>

    <main class="grid">
        <div id="intelligence-card" class="card border-STANDBY">
            <h2 style="margin: 0 0 5px 0;">Live Escape Intelligence</h2>
            <p style="margin: 0 0 15px 0; color: #94a3b8; font-size: 12px;">Urgency Status: <span id="urgency-label" class="text-STANDBY">STANDBY</span></p>
            <div id="escape-route" class="data-box">
                Sovereign Node Listening. Awaiting incoming multi-device mesh data packages...
            </div>
            <button class="btn" onclick="fetchLatestAlert()">Force Ledger Check</button>
        </div>

        <div class="card" style="border-color: #38bdf8;">
            <h2 style="margin: 0 0 5px 0; color: #38bdf8;">P2P Airwave Beacon</h2>
            <p style="font-size: 11px; color: #94a3b8; margin: 0 0 15px 0;">UDP Broadcast Stream (Port 5005)</p>
            <div id="broadcast-pulse" class="payload-box">
                GRID STATUS: NOMINAL
            </div>
        </div>
    </main>

    <script>
        // CRITICAL: Pointing dynamically to your active home Wi-Fi server address
        const SERVER_IP = "192.168.1.38"; 

        async function fetchLatestAlert() {
            try {
                // Fetching explicitly from the running server instance over secure HTTPS
                const response = await fetch(`https://${SERVER_IP}:8000/status`);
                const data = await response.json();
                
                console.log("[DASHBOARD SYNC]:", data);

                if (data.urgency) {
                    const urgency = data.urgency;
                    
                    // Update text elements natively
                    document.getElementById('urgency-label').innerText = urgency;
                    document.getElementById('escape-route').innerText = data.recommended_escape_route || "Route parameters clear.";
                    document.getElementById('broadcast-pulse').innerText = data.radio_broadcast_pulse || "SIGNAL BROADCAST ACTIVE";
                    
                    // Update layout color themes dynamically
                    const intelCard = document.getElementById('intelligence-card');
                    const label = document.getElementById('urgency-label');
                    
                    intelCard.className = `card border-${urgency}`;
                    label.className = `text-${urgency}`;
                }
            } catch (error) {
                console.error("[DASHBOARD SYNC ERROR]:", error);
            }
        }

        // Check for ledger mutations every 3 seconds
        setInterval(fetchLatestAlert, 3000);
        window.onload = fetchLatestAlert;
    </script>
</body>
</html>
